# Railway / Nixpacks build configuration
# Ensures ffmpeg is installed in the runtime image so that pydub and spotdl
# can perform audio conversion (mp3, flac, etc.) without "Couldn't find ffmpeg" warnings.

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "gcc", "pkg-config"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && python main.py"
